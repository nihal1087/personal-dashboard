<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="index.css" />
  <title>Personal Dashboard</title>
</head>

<body>
  <main class="dashboard">
    <section id="gitHub" class="widget repo-widget" aria-live="polite"></section>

    <section class="focus" aria-label="Current time and quote">
      <h1 id="time" class="time"></h1>
      <div id="quote-section" class="quote-section">
        <p id="quote-text"></p>
        <p id="quote-author"></p>
      </div>
    </section>

    <section id="leetcode" class="widget leetcode" aria-live="polite"></section>
    <section id="weather" class="widget weather-widget" aria-live="polite"></section>
    <p id="author" class="photo-credit"></p>
  </main>
  <script src="index.js" type="module"></script>
</body>

</html>
